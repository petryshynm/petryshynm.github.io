<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <title>Project name</title>
</head>

<body>
    <header class="header">
        <div class="header__container">
            <a class="header__logo logo" href="index.html">
                <img src="../images/logo.png" alt="logo" class="logo__image">
                <h1 class="logo__name">Brand name</h1>
            </a>
            <div class="header__menu menu">
                <nav class="menu__body">
                    <ul class="menu__list">
                        <li><a href="index.html" class="menu__link">Головна сторінка</a></li>
                        <li><a href="faq.html" class="menu__link">FAQ</a></li>
                        <li><a href="calculator.html" class="menu__link">Калькулятор</a></li>
                        <li><a href="contacts.html" class="menu__link">Контакти</a></li>
                        <div class="menu__mobile _hide">
                            <li><a href="signUp.html" class="menu__link _active-link">Реєстрація</a></li>
                            <li><a href="signIn.html" class="menu__link">Вхід</a></li>
                        </div>

                    </ul>
                    <div class="menu__sign-buttons">
                        <input type="button" value="Вхід" class="menu-button menu__sign-in">
                        <input type="button" value="Реєстрація" class="menu-button menu__sign-up">
                    </div>
                </nav>
                <div class="menu__icon">
                    <span></span>
                </div>
            </div>

        </div>

    </header>
    <main class="page">
        <section class="container">
            <form name='signUp' class="sign-up">
                <h1 class='sign__heading'>Будь ласка, зареєструйтесь.</h1>
                <div class="sign__input-wrapper">
                    <input type="text" name="firstName" class="sign__input unchecked" id="registrationFirstName">
                    <label class="sign__input-placeholder" for="registrationFirstName">Ім'я</label>
                    <div class="sign__verify-icon"></div>
                    <div class="sign__error-message">Некоректні дані.</div>
                </div>

                <div class="sign__input-wrapper">
                    <input type="text" name="lastName" class="sign__input unchecked" id="registrationLastName">
                    <label class="sign__input-placeholder" for="registrationLastName">Прізвище</label>
                    <div class="sign__verify-icon"></div>
                    <div class="sign__error-message"> </div>
                </div>

                <div class="sign__input-wrapper">
                    <input type="email" name="email" class="sign__input unchecked" id="registrationEmail">
                    <label class="sign__input-placeholder" for="registrationEmail">Ел.пошта</label>
                    <div class="sign__verify-icon"></div>
                    <div class="sign__error-message">Некоректні дані.</div>
                </div>

                <div class="sign__input-wrapper">
                    <input type="password" name="password" class="sign__input unchecked" id="registrationPassword">
                    <label class="sign__input-placeholder" for="registrationPassword">Пароль</label>
                    <div class="sign__verify-icon"></div>
                    <div class="sign__error-message">Некоректні дані.</div>
                </div>

                <input type="button" value="Sign up" class="sign-up__button">
                <h2 class="sign__switch">Увійдіть зараз.</h2>
            </form>
        </section>
    </main>
    <script src="../scripts/jqery.main.js"></script>
    <script src="../scripts/main.js"></script>
</body>

</html>
